<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>廖鑫 - 简历</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: #f3f4f6;
        font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
      }

      .pages {
        display: grid;
        gap: 16px;
        justify-items: center;
        padding: 16px 10px 8px;
      }

      .page {
        width: min(100%, 920px);
        background: #ffffff;
        box-shadow: 0 10px 26px rgba(0, 0, 0, 0.12);
      }

      canvas {
        width: 100%;
        height: auto;
        display: block;
      }

      .download-btn {
        display: inline-block;
        padding: 11px 20px;
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 0.2px;
        text-decoration: none;
        color: #ffffff;
        background: linear-gradient(180deg, #1f1f1f 0%, #0f0f0f 100%);
        border: 1px solid #000000;
        border-radius: 999px;
        box-shadow: 0 6px 14px rgba(0, 0, 0, 0.22);
        transition: transform 0.14s ease, box-shadow 0.14s ease, filter 0.14s ease;
      }

      .download-btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 10px 18px rgba(0, 0, 0, 0.28);
        filter: brightness(1.08);
      }

      .download-btn:active {
        transform: translateY(1px) scale(0.98);
        box-shadow: 0 3px 8px rgba(0, 0, 0, 0.24);
        filter: brightness(0.94);
      }

      .download-btn:focus-visible {
        outline: 2px solid #525252;
        outline-offset: 2px;
      }

      .footer {
        display: flex;
        justify-content: center;
        padding: 20px 12px 28px;
      }
    </style>
  </head>
  <body>
    <section id="pages" class="pages"></section>
    <div class="footer">
      <a class="download-btn" href="./resume.pdf" download="廖鑫的简历.pdf">下载简历</a>
    </div>
    <script src="./assets/pdfjs/pdf.min.js"></script>
    <script>
      (async function renderPdf() {
        const pagesEl = document.getElementById("pages");
        pdfjsLib.GlobalWorkerOptions.workerSrc = "./assets/pdfjs/pdf.worker.min.js";

        const pdf = await pdfjsLib.getDocument("./resume.pdf").promise;
        for (let pageNum = 1; pageNum <= pdf.numPages; pageNum += 1) {
          const page = await pdf.getPage(pageNum);
          const baseViewport = page.getViewport({ scale: 1 });
          const targetWidth = Math.min(920, window.innerWidth - 20);
          const scale = targetWidth / baseViewport.width;
          const viewport = page.getViewport({ scale: scale * window.devicePixelRatio });

          const wrap = document.createElement("article");
          wrap.className = "page";

          const canvas = document.createElement("canvas");
          const context = canvas.getContext("2d");
          canvas.width = viewport.width;
          canvas.height = viewport.height;

          await page.render({ canvasContext: context, viewport }).promise;
          wrap.appendChild(canvas);
          pagesEl.appendChild(wrap);
        }
      })();
    </script>
  </body>
</html>
